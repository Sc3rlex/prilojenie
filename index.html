<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8" />
<title>Портал за електронна проверка</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  :root {
    --primary: #154273;
    --primary-strong: #0e3158;
    --primary-soft: #e8eef5;
    --primary-band: #4a6c8e;
    --text: #1d2026;
    --muted: #5a6573;
    --line: #d8dde4;
    --bg: #f3f4f6;
    --card: #ffffff;
    --green-bg: #e9f5ec;
    --green-text: #1f7a3a;
    --red-bg: #fdecec;
    --red-text: #c1272d;
    --amber: #c97a1a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    font-size: 15px;
    line-height: 1.5;
  }
  a { color: #fff; }
  button { font-family: inherit; cursor: pointer; }

  .topstrip { height: 110px; background: #fff; }
  .nav {
    background: var(--primary-band);
    color: #fff;
    display: flex;
    align-items: stretch;
    height: 56px;
    padding: 0 80px;
  }
  .nav-left, .nav-right { display: flex; align-items: stretch; }
  .nav-right { margin-left: auto; gap: 24px; align-items: center; }
  .nav-item {
    display: flex; align-items: center; padding: 0 22px;
    color: #fff; cursor: pointer; font-size: 15px;
    border: none; background: transparent; height: 100%;
  }
  .nav-item.active { background: #dbe6f1; color: var(--primary); }
  .nav-icon { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }

  main {
    max-width: 880px; margin: 40px auto; padding: 0 16px;
  }
  .card {
    background: var(--card);
    padding: 36px 44px;
    border-radius: 2px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
  }
  h1.page-title {
    font-size: 26px; font-weight: 700; margin: 0 0 14px;
    border-bottom: 2px solid var(--primary);
    padding-bottom: 14px;
  }
  h2.section-title {
    color: var(--primary);
    font-size: 18px; margin: 22px 0 10px;
    border-bottom: 1px solid var(--line); padding-bottom: 8px;
  }
  p { margin: 10px 0; color: var(--text); }

  label { display: block; font-weight: 700; font-size: 14px; margin: 18px 0 6px; }
  .req { color: #c1272d; }
  input[type=text], input[type=email], input[type=tel] {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--line); border-radius: 2px;
    font: inherit; background: #fff;
    transition: border-color .15s, box-shadow .15s;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(21,66,115,0.15); }
  .help { font-size: 13px; color: var(--muted); margin: 4px 0 0; }
  .error { color: #c1272d; font-size: 13px; margin-top: 6px; }

  .btn {
    display: block; width: 100%;
    padding: 14px 20px;
    background: var(--primary); color: #fff;
    border: none; border-radius: 2px;
    font-size: 16px; font-weight: 700;
    transition: background .15s;
    -webkit-appearance: none;
  }
  .btn:hover { background: var(--primary-strong); }
  .btn:disabled { background: #95a3b3; cursor: not-allowed; }

  .info-banner {
    border-left: 4px solid var(--primary);
    background: var(--primary-soft);
    padding: 14px 18px; margin: 18px 0;
    font-weight: 600; color: var(--text);
  }
  .summary-box {
    border-left: 4px solid var(--primary);
    background: #f1f3f6;
    padding: 22px; text-align: center; margin: 22px 0;
  }
  .summary-box .label { color: var(--muted); font-size: 14px; }
  .summary-box .value { color: var(--primary); font-size: 32px; font-weight: 800; margin-top: 6px; }
  .id-box {
    background: #f1f3f6; padding: 16px 22px;
    display: flex; justify-content: space-between; align-items: center;
    margin: 18px 0;
  }
  .id-box .lbl { font-size: 12px; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; }
  .id-box .num { font-size: 24px; font-weight: 800; }

  table.metrics { width: 100%; border-collapse: collapse; margin: 18px 0; }
  table.metrics thead th {
    background: #1f2733; color: #fff; text-align: left;
    padding: 14px 18px; font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
  }
  table.metrics tbody td {
    padding: 14px 18px; border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  table.metrics tbody td.val { text-align: right; font-weight: 700; white-space: nowrap; }
  table.metrics .sub { font-size: 13px; color: var(--muted); margin-top: 2px; display: block; font-weight: 400; }
  table.metrics .sub.amber { color: var(--amber); }
  table.metrics tr.row-green td { background: var(--green-bg); }
  table.metrics tr.row-green td.val,
  table.metrics tr.row-green .sub { color: var(--green-text); }
  table.metrics tr.row-red td { background: var(--red-bg); }
  table.metrics tr.row-red td.val { color: var(--red-text); }

  .why { border-left: 4px solid var(--primary); padding: 8px 22px; margin: 30px 0 0; }
  .why h3 { font-size: 18px; margin: 0 0 6px; }
  .why p { color: var(--muted); margin: 0 0 8px; }
  .why ul { padding-left: 20px; color: var(--text); }
  .why li { margin: 4px 0; }

  .pay-methods { text-align: center; margin: 18px 0 8px; }
  .pay-methods .ttl { color: var(--muted); margin-bottom: 12px; }
  .pay-row { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
  .pay-chip {
    background: #fff; border: 1px solid #e3e6ea; border-radius: 4px;
    padding: 8px 14px; font-weight: 800; font-size: 13px;
    display: inline-flex; align-items: center; min-height: 36px;
    letter-spacing: .04em;
  }
  .pay-chip.visa { color: #1a1f71; }
  .pay-chip.mc::before { content: ""; width: 18px; height: 18px; background: #eb001b; border-radius: 50%; display: inline-block; margin-right: -6px; }
  .pay-chip.mc::after { content: ""; width: 18px; height: 18px; background: #f79e1b; border-radius: 50%; display: inline-block; opacity: .9; }
  .pay-chip.amex { color: #2e77bb; }
  .pay-chip.maestro { color: #00529b; }
  .pay-chip.jcb { color: #0e4c96; }
  .pay-chip.discover { color: #f37020; }
  .pay-chip.dc { color: #1a55a6; font-size: 11px; }
  .divider { border-top: 1px solid var(--line); margin: 24px 0; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .small-note { color: var(--muted); font-size: 13px; text-align: center; margin-top: 14px; }

  footer.foot {
    background: var(--primary-band); color: #fff;
    padding: 40px 80px 24px; margin-top: 40px;
    position: relative; overflow: hidden;
  }
  footer.foot::after {
    content: ""; position: absolute; right: 80px; top: 0; bottom: 0; width: 360px;
    background: radial-gradient(circle at 70% 50%, rgba(255,255,255,0.07), transparent 60%);
    pointer-events: none;
  }
  .foot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; max-width: 1200px; }
  .foot a { display: block; padding: 4px 0; text-decoration: underline; color: #fff; opacity: .95; font-size: 14px; }
  .foot-version { text-align: right; opacity: .6; font-size: 12px; margin-top: 18px; }
  .foot-bottom {
    background: #f3f4f6; color: var(--muted); padding: 28px 80px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .placeholder-logo {
    background: repeating-linear-gradient(45deg, #e2e6ec, #e2e6ec 6px, #ecf0f4 6px, #ecf0f4 12px);
    border: 1px solid #cfd5dd; color: #6b7585;
    padding: 10px 14px; font-family: ui-monospace, Menlo, monospace; font-size: 11px;
    border-radius: 2px; min-width: 120px; text-align: center; line-height: 1.2;
  }

  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.5);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .8s linear infinite; display: inline-block; vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1f2733; color: #fff; padding: 12px 18px; border-radius: 4px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2); z-index: 50; font-size: 14px;
  }

  .check {
    display: inline-flex; align-items: center; justify-content: center;
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--green-bg); color: var(--green-text);
    font-size: 32px; font-weight: 700; margin: 0 auto 10px;
  }

  /* ---- Mobile responsive ---- */
  @media (max-width: 768px) {
    .topstrip { height: 60px; }
    .nav { padding: 0 16px; height: 48px; }
    .nav-right { gap: 12px; }
    .nav-item { padding: 0 12px; font-size: 13px; }
    .nav-icon { gap: 4px; font-size: 13px; }

    main { margin: 20px auto; padding: 0 12px; }
    .card { padding: 20px 16px; }
    h1.page-title { font-size: 20px; }
    h2.section-title { font-size: 16px; }

    .id-box { flex-direction: column; gap: 4px; text-align: center; padding: 12px 16px; }
    .id-box .num { font-size: 20px; }

    table.metrics thead th { padding: 10px 12px; font-size: 11px; }
    table.metrics tbody td { padding: 10px 12px; font-size: 13px; }
    table.metrics tbody td.val { font-size: 13px; }

    .row-2 { grid-template-columns: 1fr; gap: 0; }

    .pay-row { gap: 8px; }
    .pay-chip { padding: 6px 10px; font-size: 11px; min-height: 30px; }

    .summary-box .value { font-size: 26px; }

    footer.foot { padding: 24px 16px 16px; }
    footer.foot::after { display: none; }
    .foot-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
    .foot a { font-size: 13px; }
    .foot-bottom { padding: 16px; flex-direction: column; text-align: center; gap: 12px; }
    .placeholder-logo { min-width: 100px; font-size: 10px; }

    .why { padding: 6px 14px; }
    .why h3 { font-size: 16px; }
  }

  @media (max-width: 420px) {
    .nav-left { display: none; }
    .topstrip { height: 40px; }
    .foot-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const EUR_TO_BGN = 1.956;

function hashCode(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

function generateStats(code) {
  const h = hashCode(code);
  const allowedOptions = [50, 80, 90];
  const allowedTerm = allowedOptions[h % 3];
  const previshenie = 5 + (h % 46);
  const totalDelay = allowedTerm + previshenie;
  const maxDelay = 3 + ((h >> 5) % 4);
  const fineEur = Math.round(10 + (totalDelay / (90 + 50)) * 40);
  const fineBgn = Math.round(fineEur * EUR_TO_BGN);
  const discountPct = 30;
  const discountedEur = Math.round(fineEur * (1 - discountPct / 100));
  const discountedBgn = Math.round(discountedEur * EUR_TO_BGN);
  const now = new Date();
  const daysBack = (h % 7);
  const violationDate = new Date(now.getTime() - daysBack * 86400000);
  const dd = String(violationDate.getDate()).padStart(2, "0");
  const mm = String(violationDate.getMonth() + 1).padStart(2, "0");
  const yyyy = violationDate.getFullYear();
  const dateStr = dd + "/" + mm + "/" + yyyy;

  return {
    totalDelay,
    maxDelay,
    allowedTerm,
    previshenie,
    date: dateStr,
    fineEur,
    fineBgn,
    discountPct,
    discountedEur,
    discountedBgn,
  };
}

const Icon = {
  search: (p) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}>
      <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
    </svg>
  ),
  user: (p) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}>
      <circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/>
    </svg>
  ),
  acc: (p) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}>
      <circle cx="12" cy="4" r="2"/><path d="M5 8h14"/><path d="M12 8v7l-4 6"/><path d="M12 15l4 6"/>
    </svg>
  ),
  globe: (p) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}>
      <circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/>
    </svg>
  ),
  caret: (p) => (
    <svg width="10" height="10" viewBox="0 0 12 12" {...p}><path d="M2 4l4 4 4-4z" fill="currentColor"/></svg>
  ),
};

function Header() {
  return (
    <>
      <div className="topstrip" />
      <nav className="nav">
        <div className="nav-left">
          <button className="nav-item active">Услуги</button>
          <button className="nav-item">Помощ</button>
          <button className="nav-item">Контакти</button>
        </div>
        <div className="nav-right">
          <span className="nav-icon"><Icon.search /></span>
          <span className="nav-icon"><Icon.user /> Потребители <Icon.caret /></span>
          <span className="nav-icon"><Icon.acc /> <Icon.caret /></span>
          <span className="nav-icon"><Icon.globe /> bg <Icon.caret /></span>
        </div>
      </nav>
    </>
  );
}

function Footer() {
  const cols = [
    ["Новини", "Тестово подписване", "Преглед на е-документи"],
    ["Политика за защита на личните данни", "Политика за достъпност", "Средства за автентикация"],
    ["Условия за ползване", "Бисквитки", "Карта на сайта"],
    ["Помощ", "Видео уроци", "Контакти"],
  ];
  return (
    <>
      <footer className="foot">
        <div className="foot-grid">
          {cols.map((c, i) => (
            <div key={i}>{c.map(l => <a key={l} href="#" onClick={e => e.preventDefault()}>{l}</a>)}</div>
          ))}
        </div>
        <div className="foot-version">Версия: 1.0.4.19</div>
      </footer>
      <div className="foot-bottom">
        <div className="placeholder-logo">[ EU PARTNER<br/>LOGO ]</div>
        <div>Порталът за електронна проверка на превозни средства.</div>
        <div className="placeholder-logo">[ PROGRAM<br/>LOGO ]</div>
      </div>
    </>
  );
}

function Why() {
  return (
    <div className="why">
      <h3>Защо е удобно и практично</h3>
      <p>Защо е полезна тази информация и удобство.</p>
      <ul>
        <li>Спестявате време</li>
        <li>спестявате пари</li>
        <li>спестявате главоболия</li>
        <li>уникалност</li>
        <li>удобност</li>
        <li>креативност</li>
      </ul>
    </div>
  );
}

function StepCheck({ onNext, code, setCode }) {
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const submit = (e) => {
    e.preventDefault();
    if (!/^[A-Za-z0-9]{8}$/.test(code)) {
      setError("Уникалният номер трябва да съдържа точно 8 символа — само букви и цифри.");
      return;
    }
    setError(""); setBusy(true);
    setTimeout(() => { setBusy(false); onNext(); }, 600);
  };
  return (
    <main>
      <div className="card">
        <h1 className="page-title">Проверка валидност на приложението</h1>
        <div className="info-banner">Проверката улеснява ежедневието си</div>
        <p>В резултата от проверката ще се визуализират датите на валидност.</p>
        <p>Въведете специалния код.</p>
        <h2 className="section-title">Данни за проверка</h2>
        <form onSubmit={submit} noValidate>
          <label htmlFor="uid">Уникалният номер<span className="req"> *</span></label>
          <p className="help">Моля въведете уникалният номер който ви е връчен — съдържа 8 символа само букви и цифри.</p>
          <input
            id="uid" type="text" value={code} maxLength={8}
            onChange={e => setCode(e.target.value.toUpperCase())}
            placeholder="напр. AB12CD34"
            autoComplete="off"
          />
          {error && <div className="error">{error}</div>}
          <div style={{ height: 14 }} />
          <button className="btn" disabled={busy}>{busy && <span className="spinner" />}Провери</button>
        </form>
        <Why />
      </div>
    </main>
  );
}

function StepResult({ onNext, onBack, code }) {
  const s = useMemo(() => generateStats(code), [code]);
  return (
    <main>
      <div className="card">
        <h1 className="page-title">Проверка валидност на приложението</h1>
        <div className="id-box">
          <span className="lbl">Вашият уникален номер</span>
          <span className="num">{code}</span>
        </div>
        <div className="info-banner" style={{ background: "#eaf1f8" }}>
          Информираме ви, че плащането на приложението е забавено.
        </div>
        <table className="metrics">
          <thead><tr><th>Показател</th><th style={{ textAlign: "right" }}>Стойност</th></tr></thead>
          <tbody>
            <tr><td><b>Отчетено забавяне</b><span className="sub">време</span></td><td className="val">{s.totalDelay} дни</td></tr>
            <tr><td><b>Максимално допустимо забавяне</b><span className="sub">приспадната грешка</span></td><td className="val">{s.maxDelay} дни</td></tr>
            <tr><td><b>Разрешен срок</b><span className="sub amber">допустим срок</span></td><td className="val">{s.allowedTerm} дни</td></tr>
            <tr><td><b>Превишение</b><span className="sub">надвишаване на срока</span></td><td className="val">{s.previshenie} дни</td></tr>
            <tr><td><b>Дата на нарушението</b><span className="sub">дата на издаване на фиша</span></td><td className="val">{s.date}</td></tr>
            <tr><td><b>Размер на глобата</b><span className="sub">сума без отстъпка</span></td><td className="val">{s.fineEur} € / {s.fineBgn} лв.</td></tr>
            <tr className="row-green">
              <td><b>Отстъпка при плащане в 24 часа</b><span className="sub">Глоба от {s.fineEur} € с {s.discountPct}% отстъпка: платете само {s.discountedEur} € в рамките на 24 часа</span></td>
              <td className="val">{s.discountedEur} € / {s.discountedBgn} лв.</td>
            </tr>
            <tr className="row-red">
              <td><b>Дължима сума</b><span className="sub">сума за плащане с отстъпка</span></td>
              <td className="val">{s.discountedEur} € / {s.discountedBgn} лв.</td>
            </tr>
          </tbody>
        </table>
        <button className="btn" onClick={onNext}>Продължи с идентификацията на титуляря</button>
        <div style={{ marginTop: 12, textAlign: "center" }}>
          <a onClick={onBack} style={{ color: "var(--primary)", cursor: "pointer", textDecoration: "underline" }}>← Назад</a>
        </div>
        <Why />
      </div>
    </main>
  );
}

function StepHolder({ onNext, onBack, holder, setHolder }) {
  const [errs, setErrs] = useState({});
  const set = (k, v) => setHolder(prev => ({ ...prev, [k]: v }));
  const submit = (e) => {
    e.preventDefault();
    const e2 = {};
    if (!holder.name.trim()) e2.name = "Полето е задължително.";
    if (!holder.address.trim()) e2.address = "Полето е задължително.";
    if (!holder.city.trim()) e2.city = "Полето е задължително.";
    if (!/^\d{4}$/.test(holder.zip)) e2.zip = "Пощенският код трябва да е 4 цифри.";
    if (!/^[+0-9 ]{6,}$/.test(holder.phone)) e2.phone = "Невалиден телефонен номер.";
    if (!/^\S+@\S+\.\S+$/.test(holder.email)) e2.email = "Невалиден имейл адрес.";
    setErrs(e2);
    if (!Object.keys(e2).length) onNext();
  };
  return (
    <main>
      <div className="card">
        <h1 className="page-title">Данни за титуляря</h1>
        <p>За да се свърже плащането правилно с вашето превозно средство, е необходимо да потвърдите данните на титуляря.</p>
        <p>Прегледайте и попълнете исканата информация внимателно. Тази стъпка е само за идентификация и не генерира плащане до завършване на следващата стъпка.</p>
        <form onSubmit={submit} noValidate>
          <label>Пълно име</label>
          <input type="text" value={holder.name} onChange={e => set("name", e.target.value)} autoComplete="name" />
          {errs.name && <div className="error">{errs.name}</div>}

          <label>Адрес</label>
          <input type="text" value={holder.address} onChange={e => set("address", e.target.value)} autoComplete="street-address" />
          {errs.address && <div className="error">{errs.address}</div>}

          <label>Град</label>
          <input type="text" value={holder.city} onChange={e => set("city", e.target.value)} autoComplete="address-level2" />
          {errs.city && <div className="error">{errs.city}</div>}

          <label>Област</label>
          <input type="text" value={holder.region} onChange={e => set("region", e.target.value)} autoComplete="address-level1" />
          {errs.region && <div className="error">{errs.region}</div>}

          <label>Пощенски код</label>
          <input type="text" value={holder.zip} onChange={e => set("zip", e.target.value)} placeholder="1000" autoComplete="postal-code" />
          {errs.zip && <div className="error">{errs.zip}</div>}

          <label>Телефонен номер</label>
          <input type="tel" value={holder.phone} onChange={e => set("phone", e.target.value)} placeholder="+359 ..." autoComplete="tel" />
          {errs.phone && <div className="error">{errs.phone}</div>}

          <label>Имейл</label>
          <input type="email" value={holder.email} onChange={e => set("email", e.target.value)} autoComplete="email" />
          {errs.email && <div className="error">{errs.email}</div>}

          <div style={{ height: 18 }} />
          <button className="btn">Напред</button>
          <div style={{ marginTop: 12, textAlign: "center" }}>
            <a onClick={onBack} style={{ color: "var(--primary)", cursor: "pointer", textDecoration: "underline" }}>← Назад</a>
          </div>
        </form>
      </div>
    </main>
  );
}

function StepPay({ onNext, onBack, holder, stats }) {
  const [card, setCard] = useState({ name: holder.name || "", num: "", exp: "", cvv: "" });
  const [errs, setErrs] = useState({});
  const [busy, setBusy] = useState(false);

  const fmtNum = (v) => v.replace(/\D/g, "").slice(0, 16).replace(/(\d{4})(?=\d)/g, "$1 ");
  const fmtExp = (v) => {
    const d = v.replace(/\D/g, "").slice(0, 4);
    if (d.length < 3) return d;
    return d.slice(0, 2) + "/" + d.slice(2);
  };
  const luhn = (s) => {
    s = s.replace(/\s/g, "");
    if (!/^\d{13,19}$/.test(s)) return false;
    let sum = 0, alt = false;
    for (let i = s.length - 1; i >= 0; i--) {
      let n = +s[i];
      if (alt) { n *= 2; if (n > 9) n -= 9; }
      sum += n; alt = !alt;
    }
    return sum % 10 === 0;
  };

  const submit = (e) => {
    e.preventDefault();
    const e2 = {};
    if (!card.name.trim()) e2.name = "Въведете името от картата.";
    if (!luhn(card.num)) e2.num = "Невалиден номер на карта.";
    if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(card.exp)) e2.exp = "Формат MM/YY.";
    else {
      const [mm, yy] = card.exp.split("/").map(Number);
      const now = new Date();
      const exp = new Date(2000 + yy, mm);
      if (exp <= now) e2.exp = "Картата е изтекла.";
    }
    if (!/^\d{3,4}$/.test(card.cvv)) e2.cvv = "3–4 цифри.";
    setErrs(e2);
    if (Object.keys(e2).length) return;
    setBusy(true);
    setTimeout(() => { setBusy(false); onNext(); }, 1200);
  };

  return (
    <main>
      <div className="card">
        <h1 className="page-title">Потвърждение и плащане на дължимата сума</h1>
        <div className="summary-box">
          <div className="label">Дължима сума по фиша</div>
          <div className="value">{stats.discountedEur} € / {stats.discountedBgn} лв.</div>
        </div>
        <div className="divider" />
        <div className="pay-methods">
          <div className="ttl">Приети начини на плащане</div>
          <div className="pay-row">
            <span className="pay-chip visa">VISA</span>
            <span className="pay-chip mc">&nbsp;</span>
            <span className="pay-chip amex">AMEX</span>
            <span className="pay-chip maestro">Maestro</span>
            <span className="pay-chip jcb">JCB</span>
            <span className="pay-chip discover">DISCOVER</span>
            <span className="pay-chip dc">Diners Club</span>
          </div>
        </div>

        <form onSubmit={submit} noValidate>
          <label>Име на притежателя на картата</label>
          <input type="text" value={card.name} onChange={e => setCard({ ...card, name: e.target.value.toUpperCase() })} placeholder="IVAN PETROV" />
          {errs.name && <div className="error">{errs.name}</div>}

          <label>Номер на карта</label>
          <input type="text" value={card.num} onChange={e => setCard({ ...card, num: fmtNum(e.target.value) })} placeholder="0000 0000 0000 0000" inputMode="numeric" />
          {errs.num && <div className="error">{errs.num}</div>}

          <div className="row-2">
            <div>
              <label>Валидност до</label>
              <input type="text" value={card.exp} onChange={e => setCard({ ...card, exp: fmtExp(e.target.value) })} placeholder="MM/YY" inputMode="numeric" />
              {errs.exp && <div className="error">{errs.exp}</div>}
            </div>
            <div>
              <label>CVV</label>
              <input type="text" value={card.cvv} onChange={e => setCard({ ...card, cvv: e.target.value.replace(/\D/g, "").slice(0, 4) })} placeholder="123" inputMode="numeric" />
              {errs.cvv && <div className="error">{errs.cvv}</div>}
            </div>
          </div>

          <div style={{ height: 22 }} />
          <button className="btn" disabled={busy}>{busy && <span className="spinner" />}Плати сега</button>
          <p className="small-note">Плащането се обработва в защитена и криптирана среда, съгласно действащите стандарти за защита на данните.</p>
          <div style={{ textAlign: "center" }}>
            <a onClick={onBack} style={{ color: "var(--primary)", cursor: "pointer", textDecoration: "underline" }}>← Назад</a>
          </div>
        </form>
      </div>
    </main>
  );
}

function StepDone({ onRestart, code }) {
  return (
    <main>
      <div className="card" style={{ textAlign: "center" }}>
        <div className="check">✓</div>
        <h1 className="page-title" style={{ borderBottom: "none", textAlign: "center" }}>Плащането е успешно</h1>
        <p>Вашето плащане за приложение <b>{code || "AB12CD34"}</b> беше прието успешно. Електронна разписка е изпратена на посочения имейл.</p>
        <div className="id-box" style={{ justifyContent: "center", flexDirection: "column", gap: 4 }}>
          <span className="lbl">Транзакционен номер</span>
          <span className="num">TX-{Math.floor(Math.random() * 9e7 + 1e7)}</span>
        </div>
        <button className="btn" onClick={onRestart} style={{ maxWidth: 320, margin: "0 auto" }}>Към началото</button>
      </div>
    </main>
  );
}

function App() {
  const [step, setStep] = useState(1);
  const [code, setCode] = useState("");
  const [holder, setHolder] = useState({
    name: "", address: "", city: "", region: "", zip: "", phone: "", email: ""
  });
  const [toast, setToast] = useState("");

  const stats = useMemo(() => generateStats(code), [code]);

  useEffect(() => { window.scrollTo({ top: 0 }); }, [step]);

  const next = () => setStep(s => Math.min(5, s + 1));
  const back = () => setStep(s => Math.max(1, s - 1));

  return (
    <>
      <Header />
      {step === 1 && <StepCheck onNext={next} code={code} setCode={setCode} />}
      {step === 2 && <StepResult onNext={next} onBack={back} code={code} />}
      {step === 3 && <StepHolder onNext={next} onBack={back} holder={holder} setHolder={setHolder} />}
      {step === 4 && <StepPay onNext={next} onBack={back} holder={holder} stats={stats} />}
      {step === 5 && <StepDone code={code} onRestart={() => { setStep(1); setCode(""); }} />}
      <Footer />
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
